<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Playing - Apple Music</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="now-playing-widget" class="widget-container">
        <div id="content" class="content">
            <div class="album-art-container">
                <img id="album-art" src="" alt="Album Art" class="album-art">
                <div class="music-icon">🎵</div>
            </div>
            <div class="track-info">
                <div id="title" class="track-title"><span class="scroll-text">Aucune lecture en cours</span></div>
                <div id="artist" class="track-artist"><span class="scroll-text"></span></div>
            </div>
        </div>
    </div>

    <!-- Canvas caché pour l'extraction de couleur -->
    <canvas id="color-canvas" style="display:none;"></canvas>

    <script>
        class NowPlayingWidget {
            constructor() {
                this.currentSong = null;
                this.updateInterval = 1000; // 1 seconde
                this.autoReloadInterval = 10 * 60 * 1000; // 10 minutes
                this.jsonFile = 'current_song.json';

                // Timer pour masquer le widget après 10s d'inactivité
                this.hideDelay = 10 * 1000; // 10 secondes
                this._hideTimer = null;
                this._widgetVisible = true;

                // Couleur dynamique
                this._dynamicColorEnabled = false;
                this._colorCanvas = document.getElementById('color-canvas');
                this._colorCtx = this._colorCanvas.getContext('2d');

                // Éléments DOM
                this.elements = {
                    container: document.getElementById('now-playing-widget'),
                    content: document.getElementById('content'),
                    albumArt: document.getElementById('album-art'),
                    title: document.getElementById('title'),
                    artist: document.getElementById('artist')
                };

                this.init();
            }

            init() {
                console.log('🎵 Now Playing Widget initialisé');
                this.startPolling();
            }

            async fetchCurrentSong() {
                try {
                    // Ajouter un timestamp pour éviter le cache
                    const cacheBuster = `?t=${Date.now()}`;
                    const response = await fetch(this.jsonFile + cacheBuster);

                    if (!response.ok) {
                        throw new Error('Fichier JSON non trouvé');
                    }

                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error('Erreur lors de la lecture du fichier JSON:', error);
                    return null;
                }
            }

            hasSongChanged(newSong) {
                if (!this.currentSong && newSong) return true;
                if (this.currentSong && !newSong) return true;
                if (!this.currentSong && !newSong) return false;

                return (
                    this.currentSong.title !== newSong.title ||
                    this.currentSong.artist !== newSong.artist ||
                    this.currentSong.thumbnail !== newSong.thumbnail
                );
            }

            // ─── Couleur dynamique ───────────────────────────────────────────

            /**
             * Extrait la couleur dominante d'une image base64 via canvas.
             * Utilise un échantillonnage par blocs pour trouver la teinte la plus présente.
             * Retourne {r, g, b} ou null.
             */
            extractDominantColor(base64) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        const SIZE = 80; // réduire pour perf
                        this._colorCanvas.width = SIZE;
                        this._colorCanvas.height = SIZE;
                        this._colorCtx.drawImage(img, 0, 0, SIZE, SIZE);

                        const data = this._colorCtx.getImageData(0, 0, SIZE, SIZE).data;

                        // Bucket par teinte (HSL) pour trouver la couleur dominante non-neutre
                        const buckets = new Array(36).fill(0).map(() => ({ r: 0, g: 0, b: 0, count: 0 }));

                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
                            if (a < 128) continue;

                            const { h, s, l } = this.rgbToHsl(r, g, b);
                            // Ignorer les couleurs trop neutres (grises/blanc/noir)
                            if (s < 0.15 || l < 0.1 || l > 0.9) continue;

                            const bucket = Math.floor(h / 10);
                            buckets[bucket].r += r;
                            buckets[bucket].g += g;
                            buckets[bucket].b += b;
                            buckets[bucket].count += 1;
                        }

                        // Trouver le bucket le plus peuplé
                        let best = buckets.reduce((a, b) => b.count > a.count ? b : a, buckets[0]);

                        if (best.count === 0) {
                            resolve(null);
                            return;
                        }

                        resolve({
                            r: Math.round(best.r / best.count),
                            g: Math.round(best.g / best.count),
                            b: Math.round(best.b / best.count)
                        });
                    };
                    img.onerror = () => resolve(null);
                    img.src = `data:image/jpeg;base64,${base64}`;
                });
            }

            rgbToHsl(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;
                if (max === min) {
                    h = s = 0;
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                        case g: h = ((b - r) / d + 2) / 6; break;
                        case b: h = ((r - g) / d + 4) / 6; break;
                    }
                }
                return { h: h * 360, s, l };
            }

            /**
             * Applique la couleur dominante au widget sous forme de fond semi-transparent
             * et d'une bordure lumineuse colorée.
             */
            applyDynamicColor(color) {
                const c = this.elements.container;
                if (!color) {
                    this.resetDynamicColor();
                    return;
                }
                const { r, g, b } = color;
                // Fond : version sombre et saturée de la couleur (L≈20%, S≈75%)
                const { h } = this.rgbToHsl(r, g, b);
                const bgCol = `hsl(${h.toFixed(0)}, 75%, 20%)`;
                const brdCol = `hsl(${h.toFixed(0)}, 80%, 55%)`;
                c.style.background = bgCol;
                c.style.borderColor = `hsl(${h.toFixed(0)}, 70%, 45%)`;
                c.style.border = `1px solid hsl(${h.toFixed(0)}, 70%, 45%)`;
                c.style.boxShadow =
                    `0 8px 32px rgba(0, 0, 0, 0.5),` +
                    `0 0 0 1px ${brdCol} inset,` +
                    `0 0 30px hsl(${h.toFixed(0)}, 80%, 35% / 0.4)`;
            }

            resetDynamicColor() {
                const c = this.elements.container;
                c.style.background = '';
                c.style.borderColor = '';
                c.style.boxShadow = '';
            }

            // ─── Affichage ───────────────────────────────────────────────────

            // Démarre le timer pour masquer le widget
            scheduleHide() {
                if (this._hideTimer) return; // déjà planifié
                this._hideTimer = setTimeout(() => {
                    this.hideWidget();
                }, this.hideDelay);
            }

            // Annule le timer et s'assure que le widget est visible
            cancelHide() {
                if (this._hideTimer) {
                    clearTimeout(this._hideTimer);
                    this._hideTimer = null;
                }
                if (!this._widgetVisible) {
                    this.showWidget();
                }
            }

            hideWidget() {
                this._widgetVisible = false;
                this._hideTimer = null;
                this.elements.container.classList.add('widget-hidden');
            }

            showWidget() {
                this._widgetVisible = true;
                this.elements.container.classList.remove('widget-hidden');
            }

            async updateDisplay(songData) {
                const isInactive = !songData || songData.status === 'paused' ||
                    songData.status === 'closed' || songData.status === 'stopped';

                if (isInactive) {
                    this.scheduleHide();
                } else {
                    this.cancelHide();
                }

                // Lire l'option couleur dynamique depuis le JSON
                const dynColorFromJson = songData && songData.dynamicColor === true;
                if (dynColorFromJson !== this._dynamicColorEnabled) {
                    this._dynamicColorEnabled = dynColorFromJson;
                    if (!this._dynamicColorEnabled) {
                        this.resetDynamicColor();
                    }
                }

                // Si aucune chanson n'est en lecture
                if (!songData) {
                    await this.fadeOut();
                    this.setScrollText(this.elements.title, 'Aucune lecture en cours');
                    this.setScrollText(this.elements.artist, '');
                    this.elements.albumArt.style.display = 'none';
                    this.resetDynamicColor();
                    await this.fadeIn();
                    return;
                }

                // Vérifier si la chanson a changé
                if (this.hasSongChanged(songData)) {
                    console.log('🎵 Nouvelle chanson:', songData.title, '-', songData.artist);

                    // Transition fade out
                    await this.fadeOut();

                    // Mise à jour du contenu
                    this.setScrollText(this.elements.title, songData.title);
                    this.setScrollText(this.elements.artist, songData.artist);

                    // Mise à jour de la pochette d'album
                    if (songData.thumbnail) {
                        this.elements.albumArt.src = `data:image/jpeg;base64,${songData.thumbnail}`;
                        this.elements.albumArt.style.display = 'block';

                        // Couleur dynamique si activée
                        if (this._dynamicColorEnabled) {
                            const color = await this.extractDominantColor(songData.thumbnail);
                            this.applyDynamicColor(color);
                        }
                    } else {
                        this.elements.albumArt.style.display = 'none';
                        this.resetDynamicColor();
                    }

                    // Transition fade in
                    await this.fadeIn();

                    this.currentSong = songData;
                }
            }

            // Définit le texte et active le défilement si nécessaire
            setScrollText(container, text) {
                const span = container.querySelector('.scroll-text');

                // Annuler le cycle en cours
                if (span._scrollTimer) {
                    clearTimeout(span._scrollTimer);
                    span._scrollTimer = null;
                }
                span.style.transition = 'none';
                span.style.transform = 'translateX(0)';
                span.textContent = text;

                // Mesurer le débordement après rendu
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        const overflow = span.scrollWidth - container.clientWidth;
                        if (overflow > 0) {
                            this.startScrollCycle(span, overflow);
                        }
                    });
                });
            }

            // Cycle : pause → ← gauche → pause → droite → → recommence
            startScrollCycle(span, overflow) {
                const scrollDuration = Math.min(18000, Math.max(5000, (overflow / 50) * 1000));
                const pauseDuration = 3000; // 3s aux deux bouts

                const doCycle = () => {
                    // Phase 1 : pause au début (position gauche)
                    span._scrollTimer = setTimeout(() => {
                        // Phase 2 : défilement vers la gauche
                        span.style.transition = `transform ${scrollDuration}ms linear`;
                        span.style.transform = `translateX(-${overflow}px)`;

                        // Phase 3 : pause à la fin
                        span._scrollTimer = setTimeout(() => {
                            span._scrollTimer = setTimeout(() => {
                                // Phase 4 : retour vers la droite en douceur
                                span.style.transition = `transform ${scrollDuration}ms linear`;
                                span.style.transform = 'translateX(0)';

                                // Après le retour, recommencer le cycle
                                span._scrollTimer = setTimeout(doCycle, scrollDuration);
                            }, pauseDuration);
                        }, scrollDuration);
                    }, pauseDuration);
                };

                doCycle();
            }

            fadeOut() {
                return new Promise(resolve => {
                    this.elements.content.classList.remove('fade-in');
                    this.elements.content.classList.add('fade-out');
                    setTimeout(resolve, 300); // Durée de la transition
                });
            }

            fadeIn() {
                return new Promise(resolve => {
                    this.elements.content.classList.remove('fade-out');
                    this.elements.content.classList.add('fade-in');
                    setTimeout(resolve, 300); // Durée de la transition
                });
            }

            async poll() {
                const songData = await this.fetchCurrentSong();
                await this.updateDisplay(songData);
            }

            startPolling() {
                // Premier appel immédiat
                this.poll();

                // Ensuite polling régulier
                setInterval(() => {
                    this.poll();
                }, this.updateInterval);

                // Rechargement automatique toutes les 10 minutes pour éviter les bugs d'affichage
                setTimeout(() => {
                    location.reload();
                }, this.autoReloadInterval);
            }
        }

        // Initialiser le widget au chargement de la page
        document.addEventListener('DOMContentLoaded', () => {
            new NowPlayingWidget();
        });
    </script>
</body>

</html>
